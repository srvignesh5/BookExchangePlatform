<div class="container">
    <h1 class="text-center my-4">Add New Book</h1>
    <form (ngSubmit)="addBook()" #bookForm="ngForm">
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" class="form-control" id="title" required [(ngModel)]="book.title" name="title">
      </div>
      <div class="form-group">
        <label for="author">Author:</label>
        <input type="text" class="form-control" id="author" required [(ngModel)]="book.author" name="author">
      </div>
      <div class="form-group">
        <label for="genre">Genre:</label>
        <input type="text" class="form-control" id="genre" required [(ngModel)]="book.genre" name="genre">
      </div>
      <div class="form-group">
        <label for="condition">Condition:</label>
        <select class="form-control" id="condition" required [(ngModel)]="book.condition" name="condition">
          <option value="">Select Condition</option>
          <option value="New">New</option>
          <option value="Used">Used</option>
          <option value="Damaged">Damaged</option>
        </select>
      </div>
      <div class="form-group">
        <label for="availabilityStatus">Available:</label>
        <input type="checkbox" [(ngModel)]="book.availabilityStatus" name="availabilityStatus" id="availabilityStatus">
      </div>
      <button type="submit" class="btn btn-primary">Add Book</button>
      <a routerLink="/my-books" class="btn btn-secondary ml-2">Cancel</a>
    </form>
  </div>
