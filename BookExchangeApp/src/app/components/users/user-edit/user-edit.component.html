<div class="container">
    <h2>Edit User</h2>
    
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  
    <form (ngSubmit)="updateUser()" #userEditForm="ngForm">
      <div class="form-group">
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" class="form-control" [(ngModel)]="user.fullName" name="fullName" required />
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" class="form-control" [(ngModel)]="user.email" name="email" required />
      </div>
      <div class="form-group">
        <label for="role">Role:</label>
        <select id="role" class="form-control" [(ngModel)]="user.role" name="role">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label for="preferences">Preferences:</label>
        <input type="text" id="preferences" class="form-control" [(ngModel)]="user.preferences" name="preferences" />
      </div>
      <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" id="address" class="form-control" [(ngModel)]="user.address" name="address" />
      </div>
      <div class="form-group">
        <label for="bio">Bio:</label>
        <textarea id="bio" class="form-control" [(ngModel)]="user.bio" name="bio"></textarea>
      </div>
      <div class="form-group">
        <label for="favoriteGenres">Favorite Genres:</label>
        <input type="text" id="favoriteGenres" class="form-control" [(ngModel)]="user.favoriteGenres" name="favoriteGenres" />
      </div>

      <button type="submit" class="btn btn-primary">Update User</button>
      <button type="button" class="btn btn-secondary" (click)="router.navigate(['/users'])">Cancel</button>
    </form>
  </div>
